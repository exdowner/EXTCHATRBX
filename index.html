<!DOCTYPE html>
<html>
<head>
    <title>Chat Externo Roblox</title>
    <script src="https://www.gstatic.com/firebasejs/9.x/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x/firebase-database-compat.js"></script>
</head>
<body>
    <div id="chat"></div>
    <input type="text" id="msgInput" placeholder="Mensagem">
    <button onclick="enviar()">Enviar</button>
    
    <script>
        const firebaseConfig = {
            apiKey: "SEU_API_KEY",
            authDomain: "SEU_PROJETO.firebaseapp.com",
            databaseURL: "https://SEU_PROJETO.firebaseio.com",
            projectId: "SEU_PROJETO"
        };
        firebase.initializeApp(firebaseConfig);
        
        function enviar() {
            const msg = document.getElementById('msgInput').value;
            firebase.database().ref('messages').push({
                user: 'Admin',
                msg: msg,
                tipo: 'texto',
                timestamp: Date.now()
            });
        }
        
        firebase.database().ref('messages')
            .orderByChild('timestamp')
            .limitToLast(50)
            .on('child_added', (snap) => {
                const data = snap.val();
                const div = document.createElement('div');
                div.innerHTML = `<b>${data.user}</b>: ${data.msg} [${data.tipo}]`;
                document.getElementById('chat').appendChild(div);
            });
    </script>
</body>
</html>
