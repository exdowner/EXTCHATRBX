<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Xeno Voice</title>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB6XfFptak35pvbxmaxzbHq-kwSoo_XwUc",
  authDomain: "exiled-scripts.firebaseapp.com",
  databaseURL: "https://exiled-scripts-default-rtdb.firebaseio.com",
  projectId: "exiled-scripts",
  storageBucket: "exiled-scripts.firebasestorage.app",
  messagingSenderId: "194421147716",
  appId: "1:194421147716:web:119bfcf91c5eb8e71c5411"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let mediaRecorder;
let micStream;
let enabled = false;

const statusText = document.getElementById("status");
const toggleBtn = document.getElementById("toggle");

async function startVoice() {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });

    mediaRecorder = new MediaRecorder(micStream, {
        mimeType: 'audio/webm'
    });

    mediaRecorder.ondataavailable = async (event) => {
        if (event.data.size > 0) {

            const reader = new FileReader();

            reader.onloadend = () => {
                const base64data = reader.result;

                push(ref(db, "voiceChunks"), {
                    user: "xeno_user",
                    audio: base64data,
                    timestamp: Date.now()
                });
            };

            reader.readAsDataURL(event.data);
        }
    };

    mediaRecorder.start(1000);

    enabled = true;

    statusText.innerText = "VOICE ON";
    toggleBtn.innerText = "Disable VC";
}

function stopVoice() {

    enabled = false;

    if (mediaRecorder) {
        mediaRecorder.stop();
    }

    if (micStream) {
        micStream.getTracks().forEach(track => track.stop());
    }

    statusText.innerText = "VOICE OFF";
    toggleBtn.innerText = "Enable VC";
}

toggleBtn.onclick = async () => {

    if (!enabled) {
        await startVoice();
    } else {
        stopVoice();
    }
};

onChildAdded(ref(db, "voiceChunks"), (snapshot) => {

    const data = snapshot.val();

    if (!data.audio) return;

    const audio = new Audio(data.audio);
    audio.volume = 1;
    audio.play();

    setTimeout(() => {
        remove(snapshot.ref);
    }, 5000);
});
</script>
<style>
body {
    background: #111;
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
}

button {
    background: #00aa66;
    border: none;
    color: white;
    padding: 15px 25px;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
}

#status {
    margin-bottom: 20px;
    font-size: 22px;
}
</style>
</head>
<body>

<div id="status">VOICE OFF</div>
<button id="toggle">Enable VC</button>

</body>
</html>
